kind = "web"
previewPath = "/"
title = "Concepful"
version = "1.0.0"
id = "artifacts/concepful"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23881

[services.development]
run = "pnpm --filter @workspace/concepful run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/concepful", "run", "build" ]
publicDir = "artifacts/concepful/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23881"
BASE_PATH = "/"
